<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Taller 4</title>
  <meta name="description" content="Proyecto final Taller 4 - Joan Stiven Rios Valderrama. Inicio de sesión Roamly." />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Iniciar Sesión – Roamly" />
  <meta property="og:description" content="Accede a tu cuenta Roamly." />
  <meta property="og:url" content="#" />
  <meta property="og:type" content="website" />

  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body class="min-vh-100 d-flex flex-column">

  <a class="visually-hidden focusable position-absolute start-0 bg-warning text-dark p-2 z-3 fw-bold" href="#main-content">Saltar al contenido principal</a>

  <header>
    <nav class="navbar navbar-dark bg-dark py-2" role="navigation" aria-label="Navegación de autenticación">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold fs-3 d-flex align-items-center gap-2" href="../index.html" aria-label="Roamly – Inicio">
          <img src="../assets/img/logo.svg" alt="Roamly" width="130" height="32" loading="eager" />
        </a>
        <a href="../index.html" class="btn btn-warning rounded-pill fw-semibold px-3">
          <i class="bi bi-arrow-left me-1" aria-hidden="true"></i>Volver al inicio
        </a>
      </div>
    </nav>
  </header>

  <main id="main-content" class="flex-grow-1 d-flex align-items-center justify-content-center py-5" tabindex="-1">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-5 col-xl-4">
          <div class="card shadow-lg rounded-4 overflow-hidden">

            <div class="bg-warning text-dark text-center py-4 px-4">
              <img src="../assets/img/logo.svg" alt="Roamly" width="120" height="30" loading="eager" class="mb-3" />
              <h1 class="h4 fw-bold mb-0">Bienvenido de vuelta</h1>
              <p class="small mb-0 opacity-75">Inicia sesión en tu cuenta Roamly</p>
            </div>

            <div class="card-body p-4">
              <form method="post" action="#" novalidate aria-label="Formulario de inicio de sesión">

                <div class="form-floating mb-3">
                  <input type="email" class="form-control" id="input-email" name="email" placeholder="nombre@email.com" autocomplete="email" required aria-required="true" aria-describedby="email-hint" />
                  <label for="input-email"><i class="bi bi-envelope me-1" aria-hidden="true"></i>Correo electrónico</label>
                </div>

                <div class="form-floating mb-3">
                  <input type="password" class="form-control" id="input-password" name="password" placeholder="Contraseña" autocomplete="current-password" required aria-required="true" minlength="8" />
                  <label for="input-password"><i class="bi bi-lock me-1" aria-hidden="true"></i>Contraseña</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="checkbox-remember" name="remember" />
                    <label class="form-check-label small" for="checkbox-remember">Recordarme</label>
                  </div>
                  <a href="recover.html" class="small fw-semibold text-decoration-none text-warning-emphasis">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="button" class="btn btn-warning rounded-pill w-100 fw-bold py-2 mb-3">Iniciar Sesión</button>

              </form>
            </div>

            <div class="card-footer bg-body-tertiary text-center py-3 border-0">
              <span class="small text-muted">¿No tienes cuenta? </span>
              <a href="register.html" class="small fw-bold text-decoration-none text-warning-emphasis">Regístrate gratis</a>
            </div>
          </div>

          <nav class="text-center mt-4" aria-label="Accesos rápidos de demostración">
            <a href="admin.html" class="small text-decoration-none me-3 text-dark-emphasis">
              <i class="bi bi-shield me-1" aria-hidden="true"></i>Panel Admin
            </a>
            <a href="client.html" class="small text-decoration-none text-dark-emphasis">
              <i class="bi bi-person me-1" aria-hidden="true"></i>Panel Cliente
            </a>
          </nav>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
