<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Taller 4</title>
  <meta name="description" content="Proyecto final Taller 4 - Joan Stiven Rios Valderrama. Registro de usuario Roamly." />
  <meta name="robots" content="index, follow" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body class="min-vh-100 d-flex flex-column">

  <a class="visually-hidden focusable position-absolute start-0 bg-warning text-dark p-2 z-3 fw-bold" href="#main-content">Saltar al contenido principal</a>

  <header>
    <nav class="navbar navbar-dark bg-dark py-2" role="navigation" aria-label="Navegación de registro">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold fs-3 d-flex align-items-center gap-2" href="../index.html" aria-label="Roamly – Inicio">
          <img src="../assets/img/logo.svg" alt="Roamly" width="130" height="32" loading="eager" />
        </a>
        <a href="login.html" class="btn btn-warning rounded-pill fw-semibold px-3">
          <i class="bi bi-arrow-left me-1" aria-hidden="true"></i>Ya tengo cuenta
        </a>
      </div>
    </nav>
  </header>

  <main id="main-content" class="flex-grow-1 d-flex align-items-center justify-content-center py-5" tabindex="-1">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-11 col-sm-10 col-md-9 col-lg-7 col-xl-6">
          <div class="card shadow-lg rounded-4 overflow-hidden">

            <div class="bg-warning text-dark text-center py-4 px-3 px-sm-4">
              <img src="../assets/img/logo.svg" alt="Roamly" width="120" height="30" loading="eager" class="mb-3" />
              <h1 class="h4 fw-bold mb-0">Únete a la aventura</h1>
              <p class="small mb-0 opacity-75">Crea tu cuenta gratis y comienza a explorar</p>
            </div>

            <div class="card-body p-3 p-sm-4">
              <form method="post" action="#" novalidate aria-label="Formulario de registro">

                <div class="row g-3 mb-3">
                  <div class="col-12 col-md-6">
                    <div class="form-floating">
                      <input type="text" class="form-control" id="input-first-name" name="first_name" placeholder="Nombre" autocomplete="given-name" required aria-required="true" />
                      <label for="input-first-name"><i class="bi bi-person me-1" aria-hidden="true"></i>Nombre</label>
                    </div>
                  </div>
                  <div class="col-12 col-md-6">
                    <div class="form-floating">
                      <input type="text" class="form-control" id="input-last-name" name="last_name" placeholder="Apellidos" autocomplete="family-name" required aria-required="true" />
                      <label for="input-last-name"><i class="bi bi-person me-1" aria-hidden="true"></i>Apellidos</label>
                    </div>
                  </div>
                </div>

                <div class="row g-3 mb-3">
                  <div class="col-12 col-md-6">
                    <div class="form-floating">
                      <input type="email" class="form-control" id="input-email" name="email" placeholder="nombre@email.com" autocomplete="email" required aria-required="true" />
                      <label for="input-email"><i class="bi bi-envelope me-1" aria-hidden="true"></i>Correo electrónico</label>
                    </div>
                  </div>
                  <div class="col-12 col-md-6">
                    <div class="form-floating">
                      <input type="tel" class="form-control" id="input-phone" name="phone" placeholder="+57 300 000 0000" autocomplete="tel" />
                      <label for="input-phone"><i class="bi bi-telephone me-1" aria-hidden="true"></i>Teléfono</label>
                    </div>
                  </div>
                </div>

                <div class="row g-3 mb-4">
                  <div class="col-12 col-md-6">
                    <div class="form-floating">
                      <input type="password" class="form-control" id="input-password" name="password" placeholder="Contraseña" autocomplete="new-password" minlength="8" required aria-required="true" />
                      <label for="input-password"><i class="bi bi-lock me-1" aria-hidden="true"></i>Contraseña</label>
                    </div>
                  </div>
                  <div class="col-12 col-md-6">
                    <div class="form-floating">
                      <input type="password" class="form-control" id="input-password-confirm" name="password_confirm" placeholder="Confirmar contraseña" autocomplete="new-password" minlength="8" required aria-required="true" />
                      <label for="input-password-confirm"><i class="bi bi-lock-fill me-1" aria-hidden="true"></i>Confirmar contraseña</label>
                    </div>
                  </div>
                </div>

                <button type="button" class="btn btn-warning rounded-pill w-100 fw-bold py-2">Crear Cuenta</button>
              </form>
            </div>
            <div class="card-footer bg-body-tertiary text-center py-3 border-0">
              <span class="small text-muted">¿Ya tienes cuenta? </span>
              <a href="login.html" class="small fw-bold text-decoration-none text-warning-emphasis">Inicia sesión aquí</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
